databases:
  - name: sthenova-db
    plan: free
    databaseName: sthenova
    user: sthenova

services:
  # --- Backend: FastAPI (Python web service) ---
  - type: web
    name: sthenova-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sthenova-db
          property: connectionString

  # --- Frontend: React + Vite (static site) ---
  - type: web
    name: sthenova-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sthenova-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
