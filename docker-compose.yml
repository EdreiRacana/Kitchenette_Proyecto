version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nexus_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nexus_erp
    depends_on:
      - db
      - redis
    networks:
      - nexus_network

  db:
    image: postgres:15-alpine
    container_name: nexus_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nexus_erp
    ports:
      - "5432:5432"
    networks:
      - nexus_network

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    networks:
      - nexus_network

  # Frontend service will be added after initialization
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "5173:5173"

networks:
  nexus_network:
    driver: bridge

volumes:
  postgres_data:
